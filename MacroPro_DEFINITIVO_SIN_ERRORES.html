    const save=()=>{
      const k=apiKeyInput.trim();
      if(!k||!k.startsWith("sk-ant-")){toast("⚠ La key debe empezar con sk-ant-");return;}
      localStorage.setItem("macropro_api_key",k);
      setApiKey(k); setShowApiModal(false); setApiKeyInput("");
      toast("✅ API Key guardada — intenta el matching de nuevo");
    };
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#fff",borderRadius:20,padding:32,width:"100%",maxWidth:440,boxShadow:"0 25px 60px rgba(0,43,73,0.45)"}}>
          <div style={{textAlign:"center",marginBottom:22}}>
            <div style={{fontSize:38,marginBottom:8}}>🔑</div>
            <div style={{fontSize:21,fontWeight:800,color:"#002B49",fontFamily:"'Playfair Display',serif",marginBottom:6}}>API Key de Anthropic</div>
            <div style={{fontSize:13,color:"#4A6175",lineHeight:1.5}}>Necesitas tu API Key para usar el matching con IA.<br/>Se guarda solo en este navegador.</div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#4A6175",marginBottom:5}}>API KEY</div>
            <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} placeholder="sk-ant-api03-..." autoFocus style={{width:"100%",padding:"11px 13px",borderRadius:9,border:"2px solid #E8EDF2",fontSize:13,color:"#002B49",outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box"}}/>
          </div>
          <div style={{background:"#EEF4FF",borderRadius:9,padding:"9px 13px",marginBottom:18,fontSize:11,color:"#2563AC"}}>
            💡 Obtén tu key en <strong>console.anthropic.com</strong> → API Keys
          </div>
          <button onClick={save} style={{width:"100%",padding:"12px",background:"#F5B335",color:"#002B49",border:"none",borderRadius:9,cursor:"pointer",fontSize:14,fontWeight:800,fontFamily:"'DM Sans',sans-serif",marginBottom:9}}>
            Guardar y continuar →
          </button>
          <button onClick={()=>{setShowApiModal(false);setApiKeyInput("");}} style={{width:"100%",padding:"9px",background:"transparent",color:"#8FA3B4",border:"1px solid #E8EDF2",borderRadius:9,cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>
            Cancelar
          </button>
          {apiKey&&<div style={{marginTop:12,textAlign:"center"}}><button onClick={()=>{localStorage.removeItem("macropro_api_key");setApiKey("");toast("API Key eliminada");setShowApiModal(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#c0392b",textDecoration:"underline"}}>Borrar API Key guardada</button></div>}
        </div>
      </div>
    );
  };

  // ─── LOADING + TOAST ──────────────────────────────────────────────
  const LoadingView = () => (
    <div style={s.loadingOverlay}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:14}}>🎯</div>
        <div style={{fontSize:20,fontWeight:800,color:B.white,fontFamily:"'Playfair Display',serif",marginBottom:7}}>Analizando con IA</div>
        <div style={{fontSize:14,color:B.grey2,marginBottom:28}}>{loadingMsg}</div>
        <div style={s.spinner}/>
        <div style={{marginTop:20,fontSize:12,color:B.grey3}}>Esto tarda 5–10 segundos...</div>
      </div>
    </div>
  );

// CRM nav count
  const crmNavCount=(()=>{
    const src=inventory.length>0?inventory:SAMPLE_INVENTORY;
    const n=src.filter(l=>{const p=crmData[l.id]&&crmData[l.id].pipeline;return p&&p!=="Disponible"&&p!=="Baja";}).length;
    return n>0?" ("+n+")":"";
  })();
  // ─── RENDER ───────────────────────────────────────────────────────
  return (
    <div style={s.app}>
      <nav style={s.nav}>
        <div style={s.navLogo} onClick={()=>setView("home")}>
          <div style={{width:30,height:30,background:B.gold,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:B.navy}}>M</div>
          <span style={s.navLogoText}>Macro<span style={s.navGold}>Pro</span></span>
          <span style={{fontSize:11,color:B.grey3,fontWeight:500,marginLeft:2}}>by Grupo Guía</span>
        </div>
        <div style={s.navLinks}>
          {[["home","🏠 Inicio"],["crm","🎯 CRM"+crmNavCount],["dashboard","📊 Dashboard"],["matchClient","👤 Cliente→Lotes"],["matchLot","🏗 Lote→Clientes"],["quickSearch","🔍 Búsqueda"],["clients","👥 Clientes"],["lots","📦 Inventario"]].map(([v,l])=>(
            <button key={v} style={s.navBtn(view===v||view==="result"&&((v==="matchClient"&&matchMode==="clientToLots")||(v==="matchLot"&&matchMode==="lotToClients")))} onClick={()=>setView(v)}>{l}</button>
          ))}
          <button onClick={()=>{setApiKeyInput(localStorage.getItem("macropro_api_key")||"");setShowApiModal(true);}} style={{padding:"7px 10px",borderRadius:8,border:"none",cursor:"pointer",background:"transparent",color:apiKey?"#22c55e":"#ef4444",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}} title={apiKey?"API Key configurada ✓":"Sin API Key — click para configurar"}>{apiKey?"🔑":"⚠️"}</button>
        </div>
      </nav>
      {view==="home"&&<ViewHome/>}
      {view==="crm"&&<ViewCRM/>}
      {view==="dashboard"&&<ViewDashboard/>}
      {view==="matchClient"&&<ViewMatchClient/>}
      {view==="matchLot"&&<ViewMatchLot/>}
      {view==="result"&&<ViewResults/>}
      {view==="quickSearch"&&<ViewQuickSearch/>}
      {view==="clients"&&<ViewClients/>}
      {view==="lots"&&<ViewLots/>}
      <ModalApiKey/>
      {showAddClient&&<ModalAddClient/>}
      {selectedLotDetail&&<ModalFichaTecnica lot={selectedLotDetail} onClose={()=>setSelectedLotDetail(null)}/>}
      {loading&&<LoadingView/>}
      {toastMsg&&<div style={s.toast}>{toastMsg}</div>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(err){return {hasError:true,error:err};}
  componentDidCatch(err,info){console.error("MacroPro crash:",err,info);}
  render(){
    if(this.state.hasError){
      const e=this.state.error;
      return React.createElement("div",{style:{padding:40,fontFamily:"monospace",background:"#fef2f2",minHeight:"100vh"}},
        React.createElement("div",{style:{fontSize:20,fontWeight:800,color:"#dc2626",marginBottom:12}},"⚠ Error de aplicación — Reporte al desarrollador"),
        React.createElement("div",{style:{fontSize:14,color:"#7f1d1d",marginBottom:8}},e&&e.message),
        React.createElement("pre",{style:{fontSize:11,background:"#fff",padding:16,borderRadius:8,overflow:"auto",border:"1px solid #fca5a5"}},e&&e.stack),
        React.createElement("button",{onClick:()=>window.location.reload(),style:{marginTop:16,padding:"10px 20px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14}},"🔄 Recargar aplicación")
      );
    }
    return this.props.children;
  }
}

ReactDOM.render(React.createElement(ErrorBoundary,null,React.createElement(MacroProMatcher)), document.getElementById("root"));




</script>
</body>
