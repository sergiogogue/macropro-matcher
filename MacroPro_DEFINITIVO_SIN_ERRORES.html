const ScoreRing = ({ score, size=64 }) => {
  const r=(size-8)/2, circ=2*Math.PI*r, dash=(score/100)*circ, color=scoreColor(score);
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={B.grey1} strokeWidth={5}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}

      return true;
    });
    setQuickSearchResults(results);
    setQuickSearchDone(true);
  };

  // ── EXCEL UPLOAD INVENTARIO ───────────────────────────────────────
  const handleExcelUpload = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result,{type:"binary"});
        const sheetName = wb.SheetNames.find(n=>n.includes("INVENTARIO")||n.includes("inventario"))||wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const raw = cleanJSON(XLSX.utils.sheet_to_json(ws,{defval:"",header:1}));
        let headerRow=4;
        for(let i=0;i<Math.min(raw.length,10);i++){
          if(raw[i]&&raw[i].some(c=>c&&String(c).includes("ID Macrolote"))){headerRow=i;break;}
        }
        const headers = raw[headerRow].map(h=>String(h||"").replace(/^\* /,"").replace(/ ▼$/,"").trim());
        const norm = (h)=>String(h||"").toLowerCase().replace(/²/g,"2").replace(/³/g,"3").replace(/\./g,"").replace(/\s+/g," ").trim();
        const getVal = (row,...names) => {
          for(const name of names){
            const idx=headers.findIndex(h=>norm(h).includes(norm(name)));
            if(idx>=0&&row[idx]!==undefined&&row[idx]!=="") return row[idx];
          }
          return "";
        };
        const cleanNum = (v) => parseFloat(String(v).replace(/[$,\s]/g,""))||0;
        const mapped = raw.slice(headerRow+1)
          .filter(row=>row[0]&&String(row[0]).trim()!==""&&!String(row[0]).includes("Ej:"))
          .map((row,i)=>{
            const sup=cleanNum(getVal(row,"Superficie (m²)"));
            const pm2=cleanNum(getVal(row,"Precio por m²"));
            let total=cleanNum(getVal(row,"Precio Total"));
            if(!total&&sup&&pm2) total=sup*pm2;
            return {
              id:String(getVal(row,"ID Macrolote")||("LOT-"+(i+1)))+"-r"+i,
              nombre:String(getVal(row,"Nombre / Clave")||`Lote ${i+1}`),
              desarrollo:String(getVal(row,"Desarrollo / Proyecto")||"").trim(),
              desarrollador:String(getVal(row,"Empresa Desarrolladora","Desarrollador","Empresa Propietaria","Propietario")||"").trim(),
              tipo:String(getVal(row,"Tipo de Inventario")||"").trim(),
              ciudad:String(getVal(row,"Ciudad / Municipio")||"").trim(),
              estado:String(getVal(row,"Estado")||"").trim(),
              colonia:String(getVal(row,"Colonia / Corredor")||"").trim(),
              uso:(()=>{
                // Función especial: busca uso de suelo EXCLUYENDO "Clave Uso de Suelo"
                // Soporta formato v8 (Uso_1/Uso_2/Uso_3) y formato v6 (* Uso de Suelo)
                const getUso = (keywords) => {
                  for(const kw of keywords){
                    const idx = headers.findIndex(h => {
                      const hn = norm(h);
                      return hn.includes(norm(kw)) && !hn.includes("clave");
                    });
                    if(idx>=0 && row[idx]!==undefined && row[idx]!=="") return String(row[idx]).trim();
                  }
                  return "";
                };
                // Intentar formato v8 primero (Uso_1), luego v6 (* Uso de Suelo)
                const raw1 = getUso(["uso_1","* uso_1"]) || getUso(["uso de suelo"]) || ""; return (raw1.toUpperCase()==='N/A'||raw1==='-')?'':raw1;
              })(),
              usos_todos:(()=>{
                const getUso = (keywords) => {
                  for(const kw of keywords){
                    const idx = headers.findIndex(h => {
                      const hn = norm(h);
                      return hn.includes(norm(kw)) && !hn.includes("clave");
                    });
                    if(idx>=0 && row[idx]!==undefined && row[idx]!=="") return String(row[idx]).trim();
                  }
                  return "";
                };
                const u1 = getUso(["uso_1","* uso_1"]) || getUso(["uso de suelo"]);
                const u2 = getUso(["uso_2"]);
                const u3 = getUso(["uso_3"]);
                const cleanUso=(v)=>v&&v.trim()&&v.trim().toUpperCase()!=='N/A'&&v.trim()!=='-'?v.trim():'';
                return [u1,u2,u3].map(cleanUso).filter(Boolean);
              })(),
              sup_m2:sup, precio_m2:pm2, precio_total:total,
              status:String(getVal(row,"Status")||"Disponible"),
              entrega:String(getVal(row,"Fecha Entrega")||""),
              cos:parseFloat(getVal(row,"COS"))||0,
              cus:parseFloat(getVal(row,"CUS"))||0,
              niveles:String(getVal(row,"Niveles Permitidos")||""),
              viv_max:parseInt(getVal(row,"Viviendas Máx"))||0,
              agua:String(getVal(row,"Agua Potable")||""),
              luz:String(getVal(row,"Energía Eléctrica")||""),
              drenaje:String(getVal(row,"Drenaje Sanitario")||""),
              acceso:String(getVal(row,"Acceso a Vialidad")||""),

  const ViewQuickSearch = () => {
    // Estado LOCAL para los inputs — evita que el cursor salte al re-renderizar
    const [localUso, setLocalUso] = useState(quickSearchCriteria.uso||"");
    const [localSupMin, setLocalSupMin] = useState(quickSearchCriteria.sup_min||"");
    const [localSupMax, setLocalSupMax] = useState(quickSearchCriteria.sup_max||"");
    const [localPrecioM2, setLocalPrecioM2] = useState(quickSearchCriteria.precio_m2_max||"");
    const [localCiudad, setLocalCiudad] = useState(quickSearchCriteria.ciudad||"");
    const [localDesarrollo, setLocalDesarrollo] = useState(quickSearchCriteria.desarrollo||"");

    const inputStyle = (val) => ({
      width:"100%", padding:"11px 14px",
      border:`2px solid ${val?B.gold:B.grey1}`,
      borderRadius:9, fontSize:14, outline:"none",
      fontFamily:"'DM Sans',sans-serif",
      transition:"border-color 0.2s",
    });

    const limpiarTodo = () => {
      setLocalUso(""); setLocalSupMin(""); setLocalSupMax("");
      setLocalPrecioM2(""); setLocalCiudad(""); setLocalDesarrollo("");
      setQuickSearchCriteria({ciudad:"",desarrollo:"",uso:"",sup_min:"",sup_max:"",presupuesto_max:"",precio_m2_max:""});
      setQuickSearchResults([]); setQuickSearchDone(false);
    };

    const buscar = () => {
      // Sincronizar estado local → criterios globales y buscar
      const criterios = {
        uso: localUso, sup_min: localSupMin, sup_max: localSupMax,
        precio_m2_max: localPrecioM2, ciudad: localCiudad,
        desarrollo: localDesarrollo, presupuesto_max: ""
      };
      setQuickSearchCriteria(criterios);
      // Buscar directamente con los valores locales (no esperar setState)
      const results = srcInv.filter(lote => {
        if(localCiudad && lote.ciudad!==localCiudad) return false;

              <input

            <div>

            <div>

        {quickSearchDone&&quickSearchResults.length===0&&(()=>{

          const soloUso = localUso ? srcInv.filter(l=>{
            const uArr=l.usos_todos&&l.usos_todos.length>0?l.usos_todos:[l.uso];

          const soloUsoYSup = soloUso.filter(l=>

            (!localSupMax||l.sup_m2<=parseFloat(localSupMax||999999999))

          const soloUsoYPrecio = soloUso.filter(l=>

          );

          let mensajePrincipal = "Sin resultados con estos criterios";
          let mensajeDetalle = "Intenta ampliar los filtros";
          let pista = null;

          if(localUso && soloUso.length > 0 && soloUsoYSup.length === 0 && localSupMax){

            mensajePrincipal = `Hay ${soloUso.length} lote${soloUso.length>1?"s":""} con "${localUso}"`;

            pista = `Tu filtro de superficie máxima (${parseFloat(localSupMax).toLocaleString()} m²) los está excluyendo`;
          } else if(localUso && soloUso.length > 0 && soloUsoYPrecio.length === 0 && localPrecioM2){
            const pm2_min = Math.min(...soloUso.map(l=>l.precio_m2).filter(p=>p>0));
            mensajePrincipal = `Hay ${soloUso.length} lote${soloUso.length>1?"s":""} con "${localUso}"`;
            mensajeDetalle = `pero su precio/m² real inicia desde $${pm2_min.toLocaleString()}`;
            pista = `Tu filtro de precio máximo ($${parseFloat(localPrecioM2).toLocaleString()}/m²) los está excluyendo`;
          } else if(localUso && soloUso.length === 0){
            mensajePrincipal = `No hay lotes con uso "${localUso}" en el inventario`;
            mensajeDetalle = "Verifica que el Excel esté cargado correctamente";
          } else if(localCiudad){
            mensajePrincipal = "Sin lotes con esa combinación en esta ciudad";
            mensajeDetalle = "Prueba quitando el filtro de ciudad";

          return (

              {pista&&soloUso.length>0&&(
                <div style={{borderTop:`1px solid ${B.grey1}`,paddingTop:18}}>

              <div style={{textAlign:"center",marginTop:18}}>

          );
        })()}

    );

          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <span style={{fontSize:10,color:B.grey3,fontWeight:600,textTransform:"uppercase"}}>📍 Ciudad</span>
            <select style={s.select} value={fCity} onChange={e=>{setFCity(e.target.value);setFDev("Todos");}}>
              {lotCities.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <span style={{fontSize:10,color:B.grey3,fontWeight:600,textTransform:"uppercase",display:"flex",alignItems:"center",gap:3}}>
              🏗 Desarrollo {fCity!=="Todas"&&<span style={{fontSize:9,color:B.gold,background:"#FFF9EC",border:`1px solid ${B.gold}`,padding:"1px 4px",borderRadius:4,fontWeight:700}}>↳ {fCity}</span>}
            </span>
            <select style={{...s.select,minWidth:160}} value={fDev} onChange={e=>setFDev(e.target.value)}>
              {devs.map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <span style={{fontSize:10,color:B.grey3,fontWeight:600,textTransform:"uppercase"}}>🏙 Uso de Suelo</span>
            <select style={s.select} value={fUso} onChange={e=>setFUso(e.target.value)}>
              {lotUsos.map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
          <span style={{marginLeft:"auto",fontSize:12,color:B.grey3,fontWeight:600}}>{filtered.length} lote{filtered.length!==1?"s":""}</span>
        </div>
        {filtered.map(lot=>(
          <div key={lot.id} style={{...s.lotCard(false),cursor:"default"}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:44,height:44,borderRadius:9,background:`linear-gradient(135deg,${B.navy},${B.navyL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:B.gold,flexShrink:0,textAlign:"center",lineHeight:1.2,padding:3}}>{lot.id.split("-")[0]}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:14,color:B.navy}}>{lot.nombre}</span>
                  <>{(lot.usos_todos&&lot.usos_todos.length>0?lot.usos_todos:[lot.uso].filter(Boolean)).map((u,i)=><Tag key={i} label={u} color={i===0?B.navy:B.goldD} bg={i===0?B.blueL:"#FFF9EC"}/>)}</>
                  <Tag label={lot.ciudad} color={B.grey4} bg={B.grey1}/>
                  {lot.desarrollo&&<Tag label={lot.desarrollo} color={B.goldD} bg="#FFF9EC"/>}
                  <Tag label={lot.status||"Disponible"} color={B.green} bg={B.greenL}/>
                </div>
                <div style={{fontSize:12,color:B.grey3,display:"flex",gap:14,flexWrap:"wrap"}}>
                  <span>📐 {(lot.sup_m2||0).toLocaleString()} m²</span>
                  <span>💲 ${(lot.precio_m2||0).toLocaleString()}/m²</span>
                  <span style={{fontWeight:700,color:B.navy}}>{fmtM(lot.precio_total)}</span>
                  {lot.entrega&&<span>⚡ {lot.entrega}</span>}
                  {lot.cus&&<span>CUS: {lot.cus}</span>}
                </div>
                {lot.fortaleza&&<div style={{fontSize:12,color:B.grey3,marginTop:3,fontStyle:"italic"}}>{lot.fortaleza.substring(0,120)}{lot.fortaleza.length>120?"...":""}</div>}
              </div>
              <div style={{display:"flex",gap:7,flexShrink:0}}>
                <button style={{...s.btn("ghost"),fontSize:11,padding:"6px 11px",border:`1px solid ${B.grey2}`}} onClick={()=>setSelectedLotDetail(lot)}>📋 Ficha</button>
                <button style={s.btn("sm")} onClick={()=>{setSelectedLot(lot);setView("matchLot");}}>🎯 Match</button>
                {inventory.length>0&&<button style={{...s.btn("sm"),background:B.redL,color:B.red}} onClick={()=>deleteLot(lot.id)}>🗑</button>}
              </div>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:B.grey3,fontSize:14}}>Sin lotes con estos filtros</div>}
      </div>
    );
  };

  // ─── VIEW DASHBOARD ───────────────────────────────────────────────

  // ─── VIEW CRM ─────────────────────────────────────────────────────

  const ViewCRM = () => {
    const srcInvCRM = inventory.length>0 ? inventory : SAMPLE_INVENTORY;
    const cliSrcCRM = clients.length>0 ? clients : DEMO_CLIENTS;

    // ── STATE ──────────────────────────────────────────────────────
    const [activeTab, setActiveTab] = React.useState("dashboard");
    const [selectedLotCRM, setSelectedLotCRM] = React.useState(null);
    const [showInterModal, setShowInterModal] = React.useState(false);
    const [showFichaModal, setShowFichaModal] = React.useState(false);
    const [selectedFichaItem, setSelectedFichaItem] = React.useState(null);
    const [showNoteModal, setShowNoteModal] = React.useState(false);
    const [filterPipeline, setFilterPipeline] = React.useState("Todos");
    const [filterDesarrolloCRM, setFilterDesarrolloCRM] = React.useState("Todos");
    const [filterSemaforo, setFilterSemaforo] = React.useState("Todos");
    const [interForm, setInterForm] = React.useState({fecha:new Date().toISOString().slice(0,10),canal:"Llamada",contacto:"",reaccion:"Interesado",nota:""});
    const [noteText, setNoteText] = React.useState("");
    const [filterAsesor, setFilterAsesor] = React.useState("Todos");
    const [drawerLotes, setDrawerLotes] = React.useState(null); // {titulo, lotes, diasMin}
    const [drawerInventario, setDrawerInventario] = React.useState(null); // {titulo, lotes, semColor}
    const [filterDesarrolloGlobal, setFilterDesarrolloGlobal] = React.useState("Todos");
    const [filterDevCompania, setFilterDevCompania] = React.useState("Todos");
    const [selectedAsesorLotes, setSelectedAsesorLotes] = React.useState(null);

    const desarrolladoresCRM = [...new Set(srcInvCRM.map(l=>l.desarrollador||l.desarrollo).filter(Boolean))].sort();
    const desarrollosCRM = [...new Set(srcInvCRM.map(l=>l.desarrollo).filter(Boolean))];
    // Helper: extrae la empresa del campo "Desarrollo / Empresa" y normaliza variantes
    const getCompaniaDev=(v)=>{
      if(!v) return v;
      const parts=v.split(" / ");
      const c=parts.length>1?parts[parts.length-1].trim():v;
      return c.replace(/^Grupo\s+/i,"").trim(); // "Grupo TYA"→"TYA"
    };
    const companiasCRM=[...new Set(desarrolladoresCRM.map(getCompaniaDev).filter(Boolean))].sort();
    const desarrollosDeCompania=filterDevCompania==="Todos"?[]:
      [...new Set(srcInvCRM.filter(l=>getCompaniaDev(l.desarrollador||l.desarrollo)===filterDevCompania).map(l=>l.desarrollo).filter(Boolean))].sort();
    // Inventario filtrado: primero por empresa, luego por desarrollo específico
    const srcInvFiltrado=(()=>{
      let r=srcInvCRM;
      if(filterDevCompania!=="Todos") r=r.filter(l=>getCompaniaDev(l.desarrollador||l.desarrollo)===filterDevCompania);
      if(filterDesarrolloGlobal!=="Todos") r=r.filter(l=>l.desarrollo===filterDesarrolloGlobal);
      return r;
    })();

    // ── COMPUTED: todos los prospectos en el CRM (vista cliente-céntrica) ──
    const allProspectos = React.useMemo(()=>{
      const list=[];
      srcInvFiltrado.forEach(lot=>{
        const crm=crmData[lot.id]||{};
        (crm.prospectos||[]).forEach((p,idx)=>{
          const cli=cliSrcCRM.find(c=>c.nombre&&c.nombre.toLowerCase().trim()===p.nombre.toLowerCase().trim());
          const dias=crm.lastContact?Math.floor((Date.now()-new Date(crm.lastContact).getTime())/864e5):null;
          list.push({lotId:lot.id,lot,prospectoIdx:idx,prospecto:p,crm,cli,
            semaforo:getSemaforo(lot.id),
            pipeline:crm.pipeline||"Disponible",
            interacciones:(crm.interacciones||[]).length,
            lastContact:crm.lastContact,
            diasSinContacto:dias
          });
        });
      });
      return list.sort((a,b)=>{
        const sc={red:0,yellow:1,green:2,grey:3};
        if(sc[a.semaforo]!==sc[b.semaforo]) return sc[a.semaforo]-sc[b.semaforo];
        return (b.diasSinContacto||999)-(a.diasSinContacto||999);
      });
    },[crmData,srcInvFiltrado,cliSrcCRM,filterDesarrolloGlobal]);

    const lotsFiltered=srcInvFiltrado.filter(l=>{
      const crm=crmData[l.id]||{};
      const pip=crm.pipeline||"Disponible";
      const sem=getSemaforo(l.id);
      return (filterPipeline==="Todos"||pip===filterPipeline)&&(filterDesarrolloCRM==="Todos"||l.desarrollo===filterDesarrolloCRM)&&(filterSemaforo==="Todos"||sem===filterSemaforo);
    });

    // ── KPIs ───────────────────────────────────────────────────────
    const totalEnPipeline=srcInvCRM.filter(l=>{const p=crmData[l.id]&&crmData[l.id].pipeline;return p&&p!=="Disponible"&&p!=="Baja";}).length;
    const totalFrios=srcInvCRM.filter(l=>getSemaforo(l.id)==="red").length;
    const totalFriosF=srcInvFiltrado.filter(l=>getSemaforo(l.id)==="red").length;
    const totalPropuesta=srcInvFiltrado.filter(l=>crmData[l.id]&&crmData[l.id].pipeline==="Propuesta formal").length;
    const totalCerrado=srcInvCRM.filter(l=>crmData[l.id]&&crmData[l.id].pipeline==="Cierre").length;
    const totalInteracciones=Object.values(crmData).reduce((a,v)=>a+(v.interacciones?v.interacciones.length:0),0);
    const totalProspActivos=allProspectos.filter(p=>p.pipeline!=="Baja"&&p.pipeline!=="Disponible").length;

    // ── MINI COMPONENTS ────────────────────────────────────────────
    const Semaforo=({lotId,size})=>{
      const sz=size||14; const col=semaforoColor[getSemaforo(lotId)];
      return React.createElement("span",{title:semaforoLabel[getSemaforo(lotId)],style:{display:"inline-block",width:sz,height:sz,borderRadius:"50%",background:col,flexShrink:0,boxShadow:"0 0 5px "+col+"88"}});
    };
    const PipelineBadge=({stage})=>{
      const col=PIPELINE_COLORS[stage]||B.grey3;
      return <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,background:col+"22",color:col,border:"1px solid "+col+"44",whiteSpace:"nowrap"}}>{stage||"Disponible"}</span>;
    };

    // ══════════════════════════════════════════════════════════════
    // DASHBOARD CEO
    // ══════════════════════════════════════════════════════════════
    const DashboardCRM=()=>{
      // ── Cálculos centrales ─────────────────────────────────────
      const byPipeline={};
      PIPELINE_STAGES.forEach(s=>{byPipeline[s]=srcInvFiltrado.filter(l=>((crmData[l.id]&&crmData[l.id].pipeline)||"Disponible")===s).length;});

      // Valor pipeline en MDP (lotes con precio y etapa activa)
      const valorPipeline=srcInvFiltrado.reduce((acc,l)=>{
        const pip=(crmData[l.id]&&crmData[l.id].pipeline)||"Disponible";
        if(pip==="Disponible"||pip==="Baja") return acc;
        const precio=l.precio_total||(l.sup_m2&&l.precio_m2?l.sup_m2*l.precio_m2:0);
        return acc+precio;
      },0);
      const valorPropuestas=srcInvFiltrado.reduce((acc,l)=>{
        const pip=(crmData[l.id]&&crmData[l.id].pipeline)||"Disponible";
        if(pip!=="Propuesta formal"&&pip!=="Cierre") return acc;
        const precio=l.precio_total||(l.sup_m2&&l.precio_m2?l.sup_m2*l.precio_m2:0);
        return acc+precio;
      },0);

      // Lotes sin movimiento por periodo
      const now=Date.now();
      const lotesSinContacto60=srcInvFiltrado.filter(l=>{
        const crm=crmData[l.id]||{}; const pip=crm.pipeline||"Disponible";
        if(pip==="Baja"||pip==="Cierre") return false;
        const dias=crm.lastContact?Math.floor((now-new Date(crm.lastContact).getTime())/864e5):999;
        return dias>60;
      });
      const lotesSinContacto120=srcInvFiltrado.filter(l=>{
        const crm=crmData[l.id]||{}; const pip=crm.pipeline||"Disponible";
        if(pip==="Baja"||pip==="Cierre") return false;
        const dias=crm.lastContact?Math.floor((now-new Date(crm.lastContact).getTime())/864e5):999;
        return dias>120;
      });
      const lotesSinContacto180=srcInvFiltrado.filter(l=>{
        const crm=crmData[l.id]||{}; const pip=crm.pipeline||"Disponible";
        if(pip==="Baja"||pip==="Cierre") return false;
        const dias=crm.lastContact?Math.floor((now-new Date(crm.lastContact).getTime())/864e5):999;
        return dias>180;
      });

      // Por desarrollo + por desarrollador (agrupado)
      const byDev={};
      const byDesarrollador={};
      srcInvFiltrado.forEach(l=>{
        const d=l.desarrollo||"?";
        const precio=l.precio_total||(l.sup_m2&&l.precio_m2?l.sup_m2*l.precio_m2:0);
        if(!byDev[d]) byDev[d]={total:0,interacciones:0,prospectos:0,enPipeline:0,propuesta:0,cierre:0,valorPipeline:0,valorPropuesta:0,sinMovimiento:0,sinMovimientoValor:0};
        byDev[d].total++;
        byDev[d].interacciones+=(crmData[l.id]&&crmData[l.id].interacciones?crmData[l.id].interacciones.length:0);
        byDev[d].prospectos+=(crmData[l.id]&&crmData[l.id].prospectos?crmData[l.id].prospectos.length:0);
        const pip=(crmData[l.id]&&crmData[l.id].pipeline)||"Disponible";
        if(pip!=="Disponible"&&pip!=="Baja"){byDev[d].enPipeline++;byDev[d].valorPipeline+=precio;}
        if(pip==="Propuesta formal"){byDev[d].propuesta++;byDev[d].valorPropuesta+=precio;}
        if(pip==="Cierre") byDev[d].cierre++;
        const dias2=crmData[l.id]&&crmData[l.id].lastContact?Math.floor((now-new Date(crmData[l.id].lastContact).getTime())/864e5):999;
        if(dias2>60&&pip!=="Baja"&&pip!=="Cierre"){byDev[d].sinMovimiento++;byDev[d].sinMovimientoValor+=precio;}
        // Acumular por desarrollador (para banner TYA, etc.)
        const devName=l.desarrollador||l.desarrollo||"?";
        if(!byDesarrollador[devName]) byDesarrollador[devName]={total:0,enPipeline:0,prospectos:0,propuesta:0,cierre:0,valorPipeline:0,valorPropuesta:0,sinMovimiento:0,sinMovimientoValor:0,desarrollos:new Set()};
        byDesarrollador[devName].total++;
        byDesarrollador[devName].desarrollos.add(d);
        byDesarrollador[devName].enPipeline+=byDev[d].enPipeline>0&&pip!=="Disponible"&&pip!=="Baja"?1:0;
        byDesarrollador[devName].prospectos+=(crmData[l.id]&&crmData[l.id].prospectos?crmData[l.id].prospectos.length:0);
        if(pip==="Propuesta formal"){byDesarrollador[devName].propuesta++;byDesarrollador[devName].valorPropuesta+=precio;}
        if(pip==="Cierre") byDesarrollador[devName].cierre++;
        if(pip!=="Disponible"&&pip!=="Baja"){byDesarrollador[devName].valorPipeline+=precio;}
        if(dias2>60&&pip!=="Baja"&&pip!=="Cierre"){byDesarrollador[devName].sinMovimiento++;byDesarrollador[devName].sinMovimientoValor+=precio;}
      });

      // Asesores: combina prospectos asignados + lotes con asesor en inventario
      const byAsesor={};
      // Fuente 1: prospectos CRM registrados
      allProspectos.forEach(item=>{
        const asesor=(item.cli&&item.cli.asesor)||"Sin asignar";
        if(!byAsesor[asesor]) byAsesor[asesor]={prospectos:0,interacciones:0,propuestas:0,cierres:0,sinMovimiento:0};
        byAsesor[asesor].prospectos++;
        byAsesor[asesor].interacciones+=item.interacciones;
        if(item.pipeline==="Propuesta formal") byAsesor[asesor].propuestas++;
        if(item.pipeline==="Cierre") byAsesor[asesor].cierres++;
        if(item.semaforo==="red") byAsesor[asesor].sinMovimiento++;
      });
      // Fuente 2: lotes con campo asesor en inventario (aunque no tengan prospecto CRM)
      srcInvFiltrado.forEach(l=>{
        if(!l.asesor||!l.asesor.trim()) return;
        const asesor=l.asesor.trim();
        if(!byAsesor[asesor]) byAsesor[asesor]={prospectos:0,interacciones:0,propuestas:0,cierres:0,sinMovimiento:0};
        // Contar solo si no ya está en byAsesor via prospectos
      });

      // KPIs recalculados sobre srcInvFiltrado (respetan filtro global de desarrollo)
      const totalEnPipelineF=srcInvFiltrado.filter(l=>{const p=crmData[l.id]&&crmData[l.id].pipeline;return p&&p!=="Disponible"&&p!=="Baja";}).length;
      const totalPropuestaF=srcInvFiltrado.filter(l=>crmData[l.id]&&crmData[l.id].pipeline==="Propuesta formal").length;
      const totalCerradoF=srcInvFiltrado.filter(l=>crmData[l.id]&&crmData[l.id].pipeline==="Cierre").length;
      const totalInteraccionesF=srcInvFiltrado.reduce((a,l)=>a+(crmData[l.id]&&crmData[l.id].interacciones?crmData[l.id].interacciones.length:0),0);
      const totalProspActivosF=allProspectos.filter(p=>srcInvFiltrado.find(l=>l.id===p.lotId)&&p.pipeline!=="Baja"&&p.pipeline!=="Disponible").length;
      const allProspF=allProspectos.filter(p=>srcInvFiltrado.find(l=>l.id===p.lotId));

      const fmtMDP=v=>v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>0?"$"+(v/1000).toFixed(0)+"K":"—";

      // KPI card
      const Kpi=({icon,label,val,sub,col,tag,onClick})=>(
        <div onClick={onClick} style={{background:B.white,borderRadius:12,padding:"16px 18px",boxShadow:"0 2px 12px rgba(0,43,73,0.07)",borderLeft:"4px solid "+col,cursor:onClick?"pointer":"default",transition:"transform 0.12s,box-shadow 0.12s"}}
          onMouseEnter={e=>{if(onClick){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,43,73,0.13)";}}}
          onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 2px 12px rgba(0,43,73,0.07)";}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.1,color:B.grey3}}>{label}</div>
            <div style={{fontSize:18}}>{icon}</div>
          </div>
          <div style={{fontSize:28,fontWeight:800,color:B.navy,lineHeight:1,marginBottom:3}}>{val}</div>
          {sub&&<div style={{fontSize:11,color:B.grey4}}>{sub}</div>}
          {tag&&<div style={{display:"inline-block",marginTop:5,padding:"2px 7px",borderRadius:8,fontSize:9,fontWeight:700,background:col+"18",color:col}}>{tag}</div>}
        </div>
      );

      return (
        <div>
          {/* ── FILA 1: KPIs principales ── */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:16}}>
            <Kpi icon="💰" label="Valor Pipeline" val={fmtMDP(valorPipeline)} sub={totalEnPipelineF+" lotes activos"} col="#f59e0b" tag="MDP en juego" onClick={()=>setActiveTab("kanban")}/>
            <Kpi icon="📋" label="En propuesta" val={fmtMDP(valorPropuestas)} sub={totalPropuestaF+" propuesta"+(totalPropuestaF!==1?"s":"")} col="#8B5CF6" tag="Cierre inminente" onClick={()=>{setFilterPipeline("Propuesta formal");setActiveTab("kanban");}}/>
            <Kpi icon="🏆" label="Cierres" val={totalCerradoF} sub="operaciones ganadas" col="#22c55e"/>
            <Kpi icon="👤" label="Prospectos activos" val={totalProspActivosF} sub={allProspF.length+" registrados total"} col="#3B82F6" onClick={()=>setActiveTab("prospectos")}/>
            <Kpi icon="🔄" label="Interacciones" val={totalInteraccionesF} sub="seguimientos registrados" col={B.navyL}/>
            <Kpi icon="📦" label="Inventario total" val={srcInvFiltrado.length} sub={(byPipeline["Disponible"]||0)+" disponibles"} col={B.grey3}/>
          </div>

          {/* ── BANNER DESARROLLADOR (si hay filtro activo) ── */}
          {(filterDevCompania!=="Todos"||filterDesarrolloGlobal!=="Todos")&&(()=>{
            const bannerKey=filterDesarrolloGlobal!=="Todos"?filterDesarrolloGlobal:filterDevCompania;
            const devData=(byDesarrollador[bannerKey]||byDev[bannerKey])||{total:0,enPipeline:0,prospectos:0,propuesta:0,cierre:0,valorPipeline:0,valorPropuesta:0,sinMovimiento:0,sinMovimientoValor:0};
            return (
              <div style={{background:"linear-gradient(135deg,"+B.navy+",#1a4a6b)",borderRadius:14,padding:"18px 20px",marginBottom:14,color:"#fff"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:B.gold,letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Dashboard Ejecutivo</div>
                    <div style={{fontSize:20,fontWeight:800,fontFamily:"'Playfair Display',serif"}}>{filterDesarrolloGlobal!=="Todos"?filterDesarrolloGlobal.split(" / ")[0]:filterDevCompania}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    {devData.propuesta>0&&<span style={{background:"#8B5CF6",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700}}>🎯 {devData.propuesta} en propuesta</span>}
                    {devData.cierre>0&&<span style={{background:"#22c55e",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700}}>✅ {devData.cierre} cerrado{devData.cierre!==1?"s":""}</span>}
                    {devData.sinMovimiento>0&&<span style={{background:"#ef4444",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700}}>⚠ {devData.sinMovimiento} sin movimiento</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {[
                    {label:"Total lotes",val:devData.total,sub:"en inventario",col:"rgba(255,255,255,0.9)"},
                    {label:"En Pipeline",val:devData.enPipeline,sub:"activos",col:B.gold},
                    {label:"Prospectos",val:devData.prospectos,sub:"registrados",col:"#93c5fd"},
                    {label:"Valor Pipeline",val:fmtMDP(devData.valorPipeline),sub:"en negociación",col:"#86efac"},
                    {label:"Valor Propuestas",val:fmtMDP(devData.valorPropuesta),sub:"cierre inminente",col:"#c4b5fd"},

                          <span style={{fontSize:12,fontWeight:800,color:g.col}}>{g.label}</span>
                        </div>
                        <div style={{fontSize:22,fontWeight:900,color:g.col,lineHeight:1}}>{g.lotes.length}</div>
                        <div style={{fontSize:10,color:g.col,opacity:.8,marginTop:2}}>lote{g.lotes.length!==1?"s":""}</div>
                        <div style={{fontSize:10,fontWeight:700,color:g.col,marginTop:3}}>{fmtMDP(g.valor)}</div>
                        <div style={{fontSize:9,color:g.col,opacity:.6,marginTop:2}}>Ver lista →</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}

        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    // VISTA PROSPECTOS (centrada en el cliente)
    // ══════════════════════════════════════════════════════════════
    const VistaProspectos=()=>{
      const asesores=[...new Set(allProspectos.map(p=>p.cli&&p.cli.asesor).filter(Boolean))];
      const filtered=allProspectos.filter(p=>{
        if(filterDevCompania!=="Todos"&&p.lot&&getCompaniaDev(p.lot.desarrollador||p.lot.desarrollo)!==filterDevCompania) return false;
        if(filterDesarrolloGlobal!=="Todos"&&p.lot&&(p.lot.desarrollador||p.lot.desarrollo)!==filterDesarrolloGlobal) return false;
        if(filterAsesor!=="Todos"&&(!p.cli||p.cli.asesor!==filterAsesor)) return false;
        if(filterPipeline!=="Todos"&&p.pipeline!==filterPipeline) return false;
        return true;
      });

      return (
        <div>
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <select value={filterAsesor} onChange={e=>setFilterAsesor(e.target.value)} style={{padding:"7px 10px",borderRadius:8,border:"1px solid "+B.grey1,fontSize:12,color:B.navy,background:B.white,outline:"none",fontFamily:"'DM Sans',sans-serif"}}>
              <option value="Todos">Todos los asesores</option>
              {asesores.map(a=><option key={a}>{a}</option>)}
            </select>
            <select value={filterPipeline} onChange={e=>setFilterPipeline(e.target.value)} style={{padding:"7px 10px",borderRadius:8,border:"1px solid "+B.grey1,fontSize:12,color:B.navy,background:B.white,outline:"none",fontFamily:"'DM Sans',sans-serif"}}>
              <option value="Todos">Todas las etapas</option>
              {PIPELINE_STAGES.map(s=><option key={s}>{s}</option>)}
            </select>
            <span style={{fontSize:11,color:B.grey3,marginLeft:"auto"}}>{filtered.length} prospecto{filtered.length!==1?"s":""}</span>
          </div>

          {filterAsesor!=="Todos"&&(()=>{
            const myItems=allProspectos.filter(x=>(x.cli&&x.cli.asesor===filterAsesor)||(x.prospecto&&x.prospecto.asesor===filterAsesor));
            const frios=myItems.filter(x=>x.semaforo==="red").length;
            const tibios=myItems.filter(x=>x.semaforo==="yellow").length;
            const sinInter=myItems.filter(x=>(x.crm.interacciones||[]).length===0).length;
            return (
              <div style={{background:"linear-gradient(135deg,#1e3a5f,#2d5986)",borderRadius:12,padding:"14px 18px",marginBottom:14,color:"#fff",display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
                <div style={{flex:1,minWidth:180}}>
                  <div style={{fontSize:10,fontWeight:700,color:B.gold,letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>👤 Asesor seleccionado</div>
                  <div style={{fontSize:18,fontWeight:800,fontFamily:"'Playfair Display',serif"}}>{filterAsesor}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:2}}>{myItems.length} terreno{myItems.length!==1?"s":""} opcionado{myItems.length!==1?"s":""}</div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {frios>0&&<div style={{background:"#ef4444",borderRadius:8,padding:"6px 12px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:800}}>{frios}</div>
                    <div style={{fontSize:9,opacity:.8}}>FRÍOS &gt;60d</div>
                  </div>}
                  {tibios>0&&<div style={{background:"#f59e0b",borderRadius:8,padding:"6px 12px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:800}}>{tibios}</div>
                    <div style={{fontSize:9,opacity:.8}}>TIBIOS 30-60d</div>
                  </div>}
                  {sinInter>0&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:8,padding:"6px 12px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:800}}>{sinInter}</div>
                    <div style={{fontSize:9,opacity:.8}}>SIN INTERACCIÓN</div>
                  </div>}
                  <div style={{background:"rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 12px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:800}}>{myItems.length-frios-tibios}</div>
                    <div style={{fontSize:9,opacity:.8}}>AL DÍA</div>
                  </div>
                </div>
                <button onClick={()=>setFilterAsesor("Todos")} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>✕ Ver todos</button>
              </div>
            );
          })()}

          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:48,color:B.grey3}}>
              <div style={{fontSize:36,marginBottom:8}}>👤</div>
              <div style={{fontSize:13,fontWeight:600}}>No hay prospectos activos</div>
              <div style={{fontSize:11,marginTop:4}}>Asigna clientes desde el match o desde el inventario</div>
            </div>
          )}

          {filtered.map((item,i)=>{
            const cli=item.cli; const crm=item.crm; const p=item.prospecto;
            const semCol=semaforoColor[item.semaforo];
            const lastInterSorted=(crm.interacciones||[]).slice().reverse();
            const lastInter=lastInterSorted[0];
            return (
              <div key={i} style={{background:B.white,borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,43,73,0.07)",border:"1px solid "+semCol+"55"}}>
                <div style={{display:"flex"}}>
                  <div style={{width:5,background:semCol,flexShrink:0,borderRadius:"14px 0 0 14px"}}/>
                  <div style={{flex:1,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>

                      {/* Columna izquierda: cliente */}
                      <div style={{flex:"0 0 220px",minWidth:180}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                          <Semaforo lotId={item.lotId} size={10}/>
                          <span style={{fontSize:15,fontWeight:800,color:B.navy}}>{p.nombre}</span>
                          <button onClick={(e)=>{e.stopPropagation();setSelectedFichaItem(item);setShowFichaModal(true);}} style={{background:B.navy,color:"#fff",border:"none",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,cursor:"pointer",marginLeft:4,fontFamily:"'DM Sans',sans-serif"}}>Ver ficha</button>
                        </div>
                        {cli?(
                          <div style={{background:B.offW,borderRadius:8,padding:"8px 10px",fontSize:11}}>
                            {cli.empresa&&<div style={{color:B.grey4,marginBottom:2}}>🏢 {cli.empresa}</div>}
                            {cli.asesor&&<div style={{color:"#2563AC",fontWeight:700,marginBottom:2}}>👤 {cli.asesor}</div>}
                            {(cli.telefono||p.telefono)&&<div style={{color:B.grey4,marginBottom:2}}>📞 {cli.telefono||p.telefono}</div>}
                            {(cli.email||p.email)&&<div style={{color:B.grey4,marginBottom:2}}>✉ {cli.email||p.email}</div>}
                            <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                              {cli.temperatura&&<span style={{padding:"1px 6px",borderRadius:10,fontSize:9,fontWeight:700,background:cli.temperatura==="Caliente"?"#fee2e2":cli.temperatura==="Frío"?"#dbeafe":"#fef3c7",color:cli.temperatura==="Caliente"?"#dc2626":cli.temperatura==="Frío"?"#2563eb":"#d97706"}}>{cli.temperatura}</span>}
                              {cli.uso_interes&&cli.uso_interes.length>0&&<span style={{padding:"1px 6px",borderRadius:10,fontSize:9,background:B.blueL,color:B.blue}}>{cli.uso_interes[0]}</span>}
                            </div>
                          </div>
                        ):(
                          <div style={{background:B.offW,borderRadius:8,padding:"8px 10px",fontSize:11,color:B.grey3}}>
                            {p.empresa&&<div>🏢 {p.empresa}</div>}
                            {p.telefono&&<div>📞 {p.telefono}</div>}
                            {p.email&&<div>✉ {p.email}</div>}
                            {!p.empresa&&!p.telefono&&!p.email&&<div>Sin datos de contacto</div>}
                          </div>
                        )}
                      </div>

                      {/* Columna centro: terreno + pipeline */}
                      <div style={{flex:"0 0 200px",minWidth:160}}>
                        <div style={{fontSize:10,fontWeight:700,color:B.grey3,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Terreno</div>
                        <div style={{fontWeight:700,color:B.navy,fontSize:12,marginBottom:4}}>{item.lot.nombre}</div>
                        <div style={{fontSize:11,color:B.grey4,marginBottom:6}}>{item.lot.desarrollo} · {item.lot.ciudad}</div>
                        <div style={{fontSize:11,color:B.grey4,marginBottom:8}}>{fmtM(item.lot.precio_total||0)} · {(item.lot.sup_m2||0).toLocaleString()} m²</div>
                        <PipelineBadge stage={item.pipeline}/>
                      </div>

                      {/* Columna derecha: último seguimiento + acciones */}
                      <div style={{flex:1,minWidth:180}}>
                        <div style={{fontSize:10,fontWeight:700,color:B.grey3,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>
                          Último contacto {item.diasSinContacto!==null&&<span style={{color:item.semaforo==="red"?"#ef4444":item.semaforo==="yellow"?"#f59e0b":"#22c55e",fontWeight:item.semaforo==="red"?800:600,background:item.semaforo==="red"?"#fee2e2":item.semaforo==="yellow"?"#fef3c7":"transparent",borderRadius:6,padding:item.semaforo==="red"||item.semaforo==="yellow"?"1px 5px":"0"}}>· hace {item.diasSinContacto}d {item.semaforo==="red"?"⚠":item.semaforo==="yellow"?"·":""}</span>}
                        </div>
                        {lastInter?(
                          <div style={{background:B.offW,borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                              <span style={{fontSize:10,fontWeight:700,color:B.navy}}>{lastInter.canal}</span>
                              <span style={{padding:"1px 6px",borderRadius:10,fontSize:9,fontWeight:700,background:"#dbeafe",color:"#2563eb"}}>{lastInter.reaccion}</span>
                              <span style={{fontSize:9,color:B.grey3,marginLeft:"auto"}}>{lastInter.fecha}</span>
                            </div>
                            {lastInter.nota&&<div style={{fontSize:11,color:B.grey4,fontStyle:"italic"}}>{lastInter.nota.slice(0,80)}{lastInter.nota.length>80?"...":""}</div>}
                          </div>
                        ):(
                          <div style={{background:"#fef9c3",borderRadius:8,padding:"8px 10px",marginBottom:8,fontSize:11,color:"#92400e"}}>
                            ⚠ Sin interacciones registradas
                          </div>
                        )}
                        {p.nota&&<div style={{fontSize:10,color:B.grey3,fontStyle:"italic",marginBottom:6}}>{p.nota.slice(0,60)}{p.nota.length>60?"...":""}</div>}
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          <button onClick={()=>{setSelectedLotCRM(item.lot);setShowInterModal(true);}} style={{padding:"5px 10px",background:B.gold,color:B.navy,border:"none",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>+ Interacción</button>
                          <button onClick={()=>{setSelectedLotCRM(item.lot);setActiveTab("kanban");}} style={{padding:"5px 10px",background:B.offW,color:B.grey4,border:"1px solid "+B.grey1,borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>Ver lote</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    // KANBAN BOARD
    // ══════════════════════════════════════════════════════════════
    const KanbanBoard=()=>(
      <div style={{overflowX:"auto",paddingBottom:8}}>
        <div style={{display:"flex",gap:12,minWidth:900}}>
          {PIPELINE_STAGES.map(stage=>{
            const col=PIPELINE_COLORS[stage];
            const stageLots=srcInvFiltrado.filter(l=>{
              const pip=(crmData[l.id]&&crmData[l.id].pipeline)||"Disponible";
              const dOk=filterDesarrolloCRM==="Todos"||l.desarrollo===filterDesarrolloCRM;
              return pip===stage&&dOk;
            });
            return (
              <div key={stage} style={{flex:"0 0 180px",background:B.white,borderRadius:12,border:"2px solid "+col+"33",overflow:"hidden"}}>
                <div style={{background:col+"18",borderBottom:"2px solid "+col+"33",padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,fontWeight:800,color:col}}>{stage}</span>
                  <span style={{background:col,color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700}}>{stageLots.length}</span>
                </div>
                <div style={{padding:8,maxHeight:480,overflowY:"auto"}}>
                  {stageLots.length===0&&<div style={{fontSize:10,color:B.grey3,textAlign:"center",padding:"16px 0"}}>Sin lotes</div>}
                  {stageLots.map(l=>{
                    const crm=crmData[l.id]||{};
                    const days=crm.lastContact?Math.floor((Date.now()-new Date(crm.lastContact).getTime())/864e5):null;
                    const nProsp=(crm.prospectos||[]).length;
                    return (
                      <div key={l.id} onClick={()=>{setSelectedLotCRM(l);setActiveTab("kanban");}} style={{background:B.offW,borderRadius:9,padding:"9px 10px",marginBottom:7,cursor:"pointer",border:"1px solid "+B.grey1,transition:"all 0.15s"}}
                        onMouseEnter={e=>e.currentTarget.style.borderColor=col} onMouseLeave={e=>e.currentTarget.style.borderColor=B.grey1}>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                          <Semaforo lotId={l.id} size={8}/>
                          <span style={{fontSize:10,fontWeight:700,color:B.navy,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.nombre}</span>
                        </div>
                        <div style={{fontSize:9,color:B.grey4,marginBottom:2}}>{l.desarrollo}</div>
                        <div style={{fontSize:9,color:B.grey3}}>{crm.interacciones?crm.interacciones.length:0} interacc.{nProsp>0?" · "+nProsp+" prosp.":""}  {days!==null?"· "+days+"d":""}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );

    // ══════════════════════════════════════════════════════════════
    // LISTA + LOT PANEL (derecho)
    // ══════════════════════════════════════════════════════════════
    const ListView=()=>(
      <div>
        {lotsFiltered.length===0&&<div style={{textAlign:"center",padding:40,color:B.grey3,fontSize:13}}>Sin lotes con estos filtros</div>}
        {lotsFiltered.map(l=>{
          const crm=crmData[l.id]||{};
          const lastI=crm.interacciones&&crm.interacciones.length>0?crm.interacciones[crm.interacciones.length-1]:null;
          const days=crm.lastContact?Math.floor((Date.now()-new Date(crm.lastContact).getTime())/864e5):null;
          const sem=getSemaforo(l.id);
          const semCol=semaforoColor[sem];
          const nProsp=(crm.prospectos||[]).length;
          const selected=selectedLotCRM&&selectedLotCRM.id===l.id;
          return (
            <div key={l.id} style={{background:selected?B.navy:B.white,borderRadius:12,padding:"12px 16px",marginBottom:8,boxShadow:"0 2px 8px rgba(0,43,73,0.06)",border:"2px solid "+(selected?B.gold:semCol+"44"),cursor:"pointer",transition:"all 0.15s"}}
              onClick={()=>setSelectedLotCRM(selected?null:l)}
              onMouseEnter={e=>{if(!selected)e.currentTarget.style.borderColor=semCol;}}
              onMouseLeave={e=>{if(!selected)e.currentTarget.style.borderColor=semCol+"44";}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <div style={{paddingTop:2}}><Semaforo lotId={l.id} size={12}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:800,color:selected?"#fff":B.navy}}>{l.nombre}</span>
                    <PipelineBadge stage={crm.pipeline||"Disponible"}/>
                  </div>
                  <div style={{fontSize:11,color:selected?B.grey2:B.grey4}}>{l.desarrollo} · {l.ciudad} · {fmtM(l.precio_total||0)}</div>
                  <div style={{display:"flex",gap:12,marginTop:3,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:selected?B.grey2:B.grey3}}>🔄 {crm.interacciones?crm.interacciones.length:0} interacc.</span>
                    {nProsp>0&&<span style={{fontSize:10,color:selected?"#93c5fd":"#3B82F6",fontWeight:600}}>👤 {nProsp} prospecto{nProsp!==1?"s":""}</span>}
                    {days!==null&&<span style={{fontSize:10,color:days>30?"#ef4444":selected?B.grey2:B.grey3}}>📅 hace {days}d</span>}
                    {lastI&&<span style={{fontSize:10,color:selected?B.grey2:B.grey4}}>Último: {lastI.canal}</span>}
                  </div>
                </div>
                <button onClick={e=>{e.stopPropagation();setSelectedLotCRM(l);setShowInterModal(true);}} style={{padding:"4px 9px",background:B.gold,color:B.navy,border:"none",borderRadius:6,cursor:"pointer",fontSize:10,fontWeight:700,flexShrink:0}}>+ Acción</button>
              </div>
            </div>
          );
        })}
      </div>
    );

    // ══════════════════════════════════════════════════════════════
    // LOT PANEL (detalle del lote seleccionado - lado derecho en lista)
    // ══════════════════════════════════════════════════════════════
    const LotPanel=()=>{
      if(!selectedLotCRM) return (
        <div style={{background:B.white,borderRadius:14,padding:32,textAlign:"center",color:B.grey3,border:"2px dashed "+B.grey1}}>
          <div style={{fontSize:34,marginBottom:8}}>🏗</div>
          <div style={{fontSize:12,fontWeight:600}}>Selecciona un lote</div>
          <div style={{fontSize:11,marginTop:4}}>para ver su seguimiento</div>
        </div>
      );
      const l=selectedLotCRM;
      const crm=crmData[l.id]||{pipeline:"Disponible",interacciones:[],prospectos:[],devFeedback:[]};
      const sem=getSemaforo(l.id);
      const precioTot=l.precio_total||(l.sup_m2&&l.precio_m2?l.sup_m2*l.precio_m2:0);
      return (
        <div style={{background:B.white,borderRadius:14,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,43,73,0.1)"}}>
          {/* Header */}
          <div style={{background:"linear-gradient(135deg,"+B.navy+","+B.navyL+")",padding:"16px 20px"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
              <div>
                <div style={{fontSize:9,fontWeight:700,color:B.gold,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>{l.desarrollo} · {l.id}</div>
                <div style={{fontSize:17,fontWeight:800,color:"#fff",fontFamily:"'Playfair Display',serif"}}>{l.nombre}</div>
                <div style={{fontSize:11,color:"#93c5fd",marginTop:2}}>{l.ciudad}, {l.estado}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:9,height:9,borderRadius:"50%",background:semaforoColor[sem]}}/>
                  <span style={{fontSize:9,color:"#fff",fontWeight:600}}>{semaforoLabel[sem]}</span>
                </div>
                <PipelineBadge stage={crm.pipeline||"Disponible"}/>
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:10}}>
              {[["Sup",l.sup_m2?(l.sup_m2.toLocaleString()+" m²"):"-"],["$/m²",l.precio_m2?"$"+l.precio_m2.toLocaleString():"-"],["Total",precioTot?"$"+(precioTot/1e6).toFixed(1)+"M":"-"]].map(([k,v])=>(
                <div key={k} style={{background:"rgba(255,255,255,0.12)",borderRadius:6,padding:"4px 9px",textAlign:"center"}}>
                  <div style={{fontSize:8,color:"#93c5fd",textTransform:"uppercase"}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Etapas */}
          <div style={{padding:"10px 14px",background:B.offW,borderBottom:"1px solid "+B.grey1,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:9,fontWeight:700,color:B.grey4,textTransform:"uppercase",letterSpacing:1}}>Etapa:</span>
            {PIPELINE_STAGES.map(stage=>{
              const active=(crm.pipeline||"Disponible")===stage;
              const col=PIPELINE_COLORS[stage];
              return <button key={stage} onClick={()=>updateCRM(l.id,{pipeline:stage})} style={{padding:"3px 9px",borderRadius:20,border:"2px solid "+(active?col:B.grey1),background:active?col+"22":"transparent",color:active?col:B.grey3,fontSize:10,fontWeight:700,cursor:"pointer",transition:"all 0.15s",fontFamily:"'DM Sans',sans-serif"}}>{stage}</button>;
            })}
          </div>

          {/* Contenido scrollable */}
          <div style={{padding:"12px 14px",maxHeight:420,overflowY:"auto"}}>

            {/* Asesor Asignado */}
            <div style={{marginBottom:12,background:B.offW,borderRadius:8,padding:"8px 10px",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:9,fontWeight:700,color:B.grey3,textTransform:"uppercase",letterSpacing:1,flexShrink:0}}>👤 Asesor:</span>
              <input
                key={l.id+"_asesor"}
                defaultValue={crm.asesorResponsable||l.asesor||""}

    // VISTA ASESORES — Tab dedicado
    // ══════════════════════════════════════════════════════════════
    const VistaAsesores=()=>{
      const now3=Date.now();
      // Fuente de asesor por lote: crmData.asesorResponsable > l.asesor > cli.asesor
      const getAsesorDeLote=(l)=>{
        const fromCRM=crmData[l.id]&&crmData[l.id].asesorResponsable;
        if(fromCRM&&fromCRM.trim()) return fromCRM.trim();
        if(l.asesor&&l.asesor.trim()) return l.asesor.trim();
        // Buscar en prospectos si tiene cliente con asesor
        const crm=crmData[l.id]||{};
        const prospectos=crm.prospectos||[];
        for(const p of prospectos){
          const cli=cliSrcCRM.find(c=>c.nombre&&c.nombre.toLowerCase().trim()===p.nombre.toLowerCase().trim());
          if(cli&&cli.asesor) return cli.asesor;
        }
        return null;
      };
      // Construir asesorMap con TODOS los lotes
      const asesorMap={};
      const sinAsesor=[];
      srcInvCRM.forEach(l=>{
        const crm=crmData[l.id]||{};
        const pip=crm.pipeline||"Disponible";
        const dias=crm.lastContact?Math.floor((now3-new Date(crm.lastContact).getTime())/864e5):null;
        const interacciones=(crm.interacciones||[]).length;
        const asesor=getAsesorDeLote(l);
        const entry={lotId:l.id,lot:l,pipeline:pip,diasSinContacto:dias,semaforo:getSemaforo(l.id),interacciones,prospecto:null,cli:null};
        // Add client info if exists
        const prospectos=crm.prospectos||[];
        if(prospectos.length>0){
          const p=prospectos[0];
          const cli=cliSrcCRM.find(c=>c.nombre&&c.nombre.toLowerCase().trim()===p.nombre.toLowerCase().trim());
          entry.prospecto=p; entry.cli=cli||null;
        }
        if(asesor){
          if(!asesorMap[asesor]) asesorMap[asesor]=[];
          if(!asesorMap[asesor].find(x=>x.lotId===l.id)) asesorMap[asesor].push(entry);
        } else {
          sinAsesor.push(entry);
        }
      });
      const asesores=Object.keys(asesorMap).sort();
      const movBadgeA=(dias)=>{
        if(dias===null) return {label:"Sin registro",col:"#9ca3af",bg:"#f3f4f6"};
        if(dias>180) return {label:dias+"d ⚠⚠",col:"#fff",bg:"#7f1d1d"};
        if(dias>120) return {label:dias+"d ⚠",col:"#fff",bg:"#ef4444"};
        if(dias>60)  return {label:dias+"d •",col:"#92400e",bg:"#fef3c7"};
        if(dias>30)  return {label:dias+"d",col:"#166534",bg:"#dcfce7"};
        return {label:dias+"d ✓",col:"#15803d",bg:"#f0fdf4"};
      };
      const renderLotesTable=(lotes,asesorNombre)=>(
        <div style={{background:B.white,borderRadius:12,padding:"16px 20px",boxShadow:"0 2px 12px rgba(0,43,73,0.07)",border:"2px solid "+B.gold,marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:B.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>📋 Terrenos Opcionados</div>
              <div style={{fontSize:15,fontWeight:800,color:B.navy}}>👤 {asesorNombre} — {lotes.length} terreno{lotes.length!==1?"s":""}</div>
            </div>
            <button onClick={()=>setSelectedAsesorLotes(null)} style={{background:B.offW,border:"1px solid "+B.grey1,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:11,color:B.grey4,fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>✕ Cerrar</button>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr style={{borderBottom:"2px solid "+B.grey1}}>
                  {["Terreno","Desarrollo","Precio","Pipeline","Días sin mov.","Interacc.","Cliente"].map((h,i)=>(
                    <th key={i} style={{textAlign:i<2?"left":"center",padding:"6px 8px",fontSize:9,fontWeight:800,color:B.grey3,textTransform:"uppercase",letterSpacing:0.8,whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[...lotes].sort((a,b)=>(b.diasSinContacto||999)-(a.diasSinContacto||999)).map((x,i)=>{
                  const mb=movBadgeA(x.diasSinContacto);
                  return (
                    <tr key={i} onClick={()=>{setSelectedLotCRM(x.lot);setActiveTab("kanban");}} style={{borderBottom:"1px solid "+B.grey1,cursor:"pointer"}}
                      onMouseEnter={e=>e.currentTarget.style.background=B.offW}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{padding:"7px 8px",fontWeight:700,color:B.navy}}>{x.lot.nombre}</td>
                      <td style={{padding:"7px 8px",color:B.grey4}}>{x.lot.desarrollo}</td>
                      <td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:B.navy}}>{fmtM(x.lot.precio_total||0)}</td>
                      <td style={{padding:"7px 8px",textAlign:"center"}}><span style={{padding:"1px 7px",borderRadius:10,fontSize:9,fontWeight:700,background:(PIPELINE_COLORS[x.pipeline]||B.grey3)+"22",color:PIPELINE_COLORS[x.pipeline]||B.grey3}}>{x.pipeline}</span></td>
                      <td style={{padding:"7px 8px",textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:8,fontSize:10,fontWeight:700,background:mb.bg,color:mb.col}}>{mb.label}</span></td>
                      <td style={{padding:"7px 8px",textAlign:"center",color:x.interacciones>0?B.navy:B.grey3}}>{x.interacciones}</td>
                      <td style={{padding:"7px 8px",textAlign:"center",fontSize:10,color:B.grey4}}>{x.cli?x.cli.nombre:x.prospecto?x.prospecto.nombre:"—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
      return (
        <div>
          {/* Info si no hay asesores */}
          {asesores.length===0&&sinAsesor.length===0&&(
            <div style={{textAlign:"center",padding:60,color:B.grey3}}>
              <div style={{fontSize:40,marginBottom:12}}>🧑‍💼</div>
              <div style={{fontSize:14,fontWeight:700,color:B.navy,marginBottom:8}}>Sin asesores registrados</div>
              <div style={{fontSize:12,maxWidth:400,margin:"0 auto",lineHeight:1.6}}>Asigna asesores de dos formas: (1) En el <strong>Kanban</strong>, abre cualquier lote y edita el campo "Asesor". (2) Asegúrate de que tu Excel tenga columna <strong>"Asesor Responsable"</strong>.</div>
            </div>
          )}
          {/* Cards de asesores */}
          {asesores.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:B.grey3,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>👤 Asesores con terrenos asignados ({asesores.length})</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginBottom:8}}>
                {asesores.map(a=>{
                  const lotes=asesorMap[a];
                  const frios=lotes.filter(x=>x.diasSinContacto===null||x.diasSinContacto>60).length;
                  const enPipeline=lotes.filter(x=>x.pipeline!=="Disponible"&&x.pipeline!=="Baja").length;
                  const isSelected=selectedAsesorLotes===a;
                  return (
                    <div key={a} onClick={()=>setSelectedAsesorLotes(isSelected?null:a)}
                      style={{background:isSelected?B.navy:B.white,borderRadius:12,padding:"12px 14px",cursor:"pointer",border:"2px solid "+(isSelected?B.navy:B.grey1),transition:"all 0.15s",boxShadow:isSelected?"0 4px 14px rgba(0,43,73,0.2)":"0 1px 4px rgba(0,43,73,0.06)"}}>
                      <div style={{fontSize:13,fontWeight:800,color:isSelected?"#fff":B.navy,marginBottom:5}}>{a}</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:11,color:isSelected?"rgba(255,255,255,0.7)":B.grey3}}>{lotes.length} lote{lotes.length!==1?"s":""}</span>
                        {enPipeline>0&&<span style={{fontSize:10,fontWeight:700,color:isSelected?B.gold:"#d97706",background:isSelected?"rgba(255,255,255,0.1)":"#fef3c7",borderRadius:6,padding:"1px 6px"}}>{enPipeline} activo{enPipeline!==1?"s":""}</span>}
                        {frios>0&&<span style={{fontSize:10,fontWeight:700,color:"#dc2626",background:"#fee2e2",borderRadius:6,padding:"1px 6px"}}>⚠ {frios}</span>}
                      </div>
                      {isSelected&&<div style={{fontSize:9,color:"rgba(255,255,255,0.5)",marginTop:4}}>▼ tabla expandida abajo</div>}
                    </div>
                  );
                })}
              </div>
              {selectedAsesorLotes&&asesorMap[selectedAsesorLotes]&&renderLotesTable(asesorMap[selectedAsesorLotes],selectedAsesorLotes)}
            </div>
          )}
          {/* Lotes sin asesor asignado */}
          {sinAsesor.length>0&&(
            <div>
              <div style={{fontSize:11,fontWeight:700,color:B.grey3,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>
                ⚠ Sin asesor asignado ({sinAsesor.length} lote{sinAsesor.length!==1?"s":""})
                <span style={{fontSize:10,fontWeight:400,color:B.grey3,marginLeft:8,textTransform:"none"}}>— Abre el lote en Kanban para asignar</span>
              </div>
              <div style={{background:"#fffbeb",border:"1px solid #f59e0b",borderRadius:10,padding:"8px 0",overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #f59e0b33"}}>
                      {["Terreno","Desarrollo","Precio","Pipeline","Días sin mov."].map((h,i)=>(
                        <th key={i} style={{textAlign:i<2?"left":"center",padding:"5px 10px",fontSize:9,fontWeight:800,color:"#92400e",textTransform:"uppercase",letterSpacing:0.8}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...sinAsesor].sort((a,b)=>(b.diasSinContacto||999)-(a.diasSinContacto||999)).slice(0,20).map((x,i)=>{
                      const mb=movBadgeA(x.diasSinContacto);
                      return (
                        <tr key={i} onClick={()=>{setSelectedLotCRM(x.lot);setActiveTab("kanban");}} style={{borderBottom:"1px solid #f59e0b22",cursor:"pointer"}}
                          onMouseEnter={e=>e.currentTarget.style.background="#fef3c7"}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <td style={{padding:"6px 10px",fontWeight:600,color:B.navy}}>{x.lot.nombre}</td>
                          <td style={{padding:"6px 10px",color:B.grey4}}>{x.lot.desarrollo}</td>
                          <td style={{padding:"6px 10px",textAlign:"center",color:B.navy}}>{fmtM(x.lot.precio_total||0)}</td>
                          <td style={{padding:"6px 10px",textAlign:"center"}}><span style={{padding:"1px 6px",borderRadius:10,fontSize:9,fontWeight:700,background:(PIPELINE_COLORS[x.pipeline]||B.grey3)+"22",color:PIPELINE_COLORS[x.pipeline]||B.grey3}}>{x.pipeline}</span></td>
                          <td style={{padding:"6px 10px",textAlign:"center"}}><span style={{padding:"2px 7px",borderRadius:7,fontSize:10,fontWeight:700,background:mb.bg,color:mb.col}}>{mb.label}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {sinAsesor.length>20&&<div style={{textAlign:"center",padding:"6px",fontSize:10,color:"#92400e"}}>...y {sinAsesor.length-20} lotes más sin asesor</div>}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    // RENDER PRINCIPAL
    // ══════════════════════════════════════════════════════════════
    return (
      <div style={{maxWidth:1400,margin:"0 auto",padding:"24px 20px 40px"}}>
        {/* Header */}
        <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5,color:B.gold,marginBottom:3}}>🎯 CRM Macrolotes</div>
            <div style={{fontSize:24,fontWeight:800,color:B.navy,fontFamily:"'Playfair Display',serif"}}>Seguimiento Activo{filterDevCompania!=="Todos"&&<span style={{fontSize:14,color:B.gold,marginLeft:8}}>— {filterDevCompania}{filterDesarrolloGlobal!=="Todos"&&<span style={{fontSize:12,opacity:.8}}> / {filterDesarrolloGlobal.split(" / ")[0]}</span>}</span>}</div>
            <div style={{fontSize:12,color:B.grey3,marginTop:3}}>
              {srcInvCRM.length} lotes · {totalProspActivos} prospectos activos · {totalInteracciones} interacciones
              {totalFriosF>0&&<span style={{color:"#ef4444",fontWeight:700}}> · {totalFriosF} fríos ⚠</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            <button onClick={exportCRMJson} style={{padding:"8px 13px",background:B.navy,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>⬇ Exportar JSON</button>
            <label style={{padding:"8px 13px",background:B.offW,color:B.grey4,border:"1px solid "+B.grey1,borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4,fontFamily:"'DM Sans',sans-serif"}}>
              ⬆ Importar<input type="file" accept=".json" onChange={importCRMJson} style={{display:"none"}}/>
            </label>
          </div>
        </div>

        {/* Filtro por Empresa Desarrolladora — Nivel 1 */}
        <div style={{marginBottom:desarrollosDeCompania.length>0?6:14,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:10,fontWeight:700,color:B.grey3,textTransform:"uppercase",letterSpacing:1,marginRight:2}}>Empresa:</span>
          <button onClick={()=>{setFilterDevCompania("Todos");setFilterDesarrolloGlobal("Todos");}} style={{padding:"4px 11px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:filterDevCompania==="Todos"?B.navy:"transparent",color:filterDevCompania==="Todos"?"#fff":B.grey4,outline:"1px solid "+(filterDevCompania==="Todos"?B.navy:B.grey1)}}>Todos</button>
          {companiasCRM.map(c=>(
            <button key={c} onClick={()=>{if(filterDevCompania===c){setFilterDevCompania("Todos");setFilterDesarrolloGlobal("Todos");}else{setFilterDevCompania(c);setFilterDesarrolloGlobal("Todos");}}} style={{padding:"4px 11px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:filterDevCompania===c?B.gold:B.offW,color:filterDevCompania===c?B.navy:B.grey4,outline:"1px solid "+(filterDevCompania===c?B.gold:B.grey1)}}>{c}</button>
          ))}
        </div>
        {/* Nivel 2: Desarrollos de la empresa seleccionada */}
        {desarrollosDeCompania.length>0&&(
          <div style={{marginBottom:14,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",paddingLeft:16,borderLeft:"3px solid "+B.gold}}>
            <span style={{fontSize:10,fontWeight:700,color:B.gold,textTransform:"uppercase",letterSpacing:1,marginRight:2}}>↳ Desarrollo:</span>
            <button onClick={()=>setFilterDesarrolloGlobal("Todos")} style={{padding:"3px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:filterDesarrolloGlobal==="Todos"?B.navy:"transparent",color:filterDesarrolloGlobal==="Todos"?"#fff":B.grey4,outline:"1px solid "+(filterDesarrolloGlobal==="Todos"?B.navy:B.grey1)}}>Todos</button>
            {desarrollosDeCompania.map(d=>{
              const label=d.includes(" / ")?d.split(" / ")[0].trim():d;
              return <button key={d} onClick={()=>setFilterDesarrolloGlobal(filterDesarrolloGlobal===d?"Todos":d)} style={{padding:"3px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:filterDesarrolloGlobal===d?B.navy:B.offW,color:filterDesarrolloGlobal===d?"#fff":B.grey4,outline:"1px solid "+(filterDesarrolloGlobal===d?B.navy:B.grey1)}}>{label}</button>;
            })}
          </div>
        )}

        {/* Tabs */}
        <div style={{display:"flex",gap:2,marginBottom:18,background:B.white,borderRadius:10,padding:4,border:"1px solid "+B.grey1,width:"fit-content"}}>
          {[["dashboard","📊 Dashboard"],["prospectos","👤 Prospectos"],["kanban","📋 Kanban"],["asesores","🧑‍💼 Asesores"]].map(([t,l])=>(
            <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'DM Sans',sans-serif",background:activeTab===t?B.navy:"transparent",color:activeTab===t?"#fff":B.grey4,transition:"all 0.15s"}}>{l}</button>
          ))}
        </div>

        {/* Filtros (en tabs lista/kanban) */}
        {activeTab==="kanban"&&(
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            {[["filterDesarrolloCRM",filterDesarrolloCRM,setFilterDesarrolloCRM,["Todos los desarrollos",...desarrollosCRM]],
              ["filterPipeline",filterPipeline,setFilterPipeline,["Todos",...PIPELINE_STAGES]]].map(([key,val,setter,opts])=>(
              <select key={key} value={val} onChange={e=>setter(e.target.value)} style={{padding:"7px 10px",borderRadius:8,border:"1px solid "+B.grey1,fontSize:12,color:B.navy,background:B.white,outline:"none",fontFamily:"'DM Sans',sans-serif"}}>
                {opts.map(o=><option key={o} value={o==="Todos los desarrollos"?"Todos":o}>{o}</option>)}
              </select>
            ))}
            <select value={filterSemaforo} onChange={e=>setFilterSemaforo(e.target.value)} style={{padding:"7px 10px",borderRadius:8,border:"1px solid "+B.grey1,fontSize:12,color:B.navy,background:B.white,outline:"none",fontFamily:"'DM Sans',sans-serif"}}>
              <option value="Todos">Todos los semáforos</option>
              <option value="green">🟢 Activo</option>
              <option value="yellow">🟡 Tibio</option>
              <option value="red">🔴 Frío</option>
              <option value="grey">⚫ Sin seguimiento</option>
            </select>
            <span style={{fontSize:11,color:B.grey3}}>{lotsFiltered.length} lotes</span>
            {(filterPipeline!=="Todos"||filterDesarrolloCRM!=="Todos"||filterSemaforo!=="Todos")&&
              <button onClick={()=>{setFilterPipeline("Todos");setFilterDesarrolloCRM("Todos");setFilterSemaforo("Todos");}} style={{padding:"5px 10px",background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>✕ Limpiar</button>}
          </div>
        )}

        {/* Contenido */}
        {activeTab==="dashboard"&&DashboardCRM()}
        {activeTab==="prospectos"&&VistaProspectos()}
        {activeTab==="asesores"&&VistaAsesores()}
        {activeTab==="kanban"&&(
          <div>
            {KanbanBoard()}
            <div style={{marginTop:14}}>{LotPanel()}</div>
          </div>
        )}


        {/* Drawer: Lista de lotes sin movimiento */}
        {drawerLotes&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1900,display:"flex",justifyContent:"flex-end"}} onClick={e=>e.target===e.currentTarget&&setDrawerLotes(null)}>
            <div style={{width:"100%",maxWidth:520,background:B.white,height:"100%",overflowY:"auto",boxShadow:"-4px 0 30px rgba(0,43,73,0.18)",display:"flex",flexDirection:"column"}}>
              {/* Drawer header */}
              <div style={{background:"linear-gradient(135deg,"+B.navy+","+B.navyL+")",padding:"20px 22px",flexShrink:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:B.gold,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>⏰ Sin Movimiento</div>
                    <div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:"'Playfair Display',serif"}}>{drawerLotes.titulo}</div>
                    <div style={{fontSize:11,color:"#93c5fd",marginTop:3}}>{drawerLotes.lotes.length} lote{drawerLotes.lotes.length!==1?"s":""} requieren atención</div>
                  </div>
                  <button onClick={()=>setDrawerLotes(null)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>✕ Cerrar</button>
                </div>
              </div>
              {/* Drawer content */}
              <div style={{flex:1,padding:"14px 16px",overflowY:"auto"}}>
                {drawerLotes.lotes.length===0&&<div style={{textAlign:"center",padding:40,color:B.grey3}}>No hay lotes en esta categoría</div>}
                {drawerLotes.lotes.map((l,i)=>{
                  const crm=crmData[l.id]||{};
                  const dias=crm.lastContact?Math.floor((Date.now()-new Date(crm.lastContact).getTime())/864e5):null;
                  const pip=crm.pipeline||"Disponible";
                  const pipCol=PIPELINE_COLORS[pip]||B.grey3;
                  const precio=l.precio_total||(l.sup_m2&&l.precio_m2?l.sup_m2*l.precio_m2:0);
                  const nProsp=(crm.prospectos||[]).length;
                  const lastInter=(crm.interacciones||[]).slice(-1)[0];
                  return (
                    <div key={l.id} style={{background:B.offW,borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid "+B.grey1}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:800,color:B.navy,fontSize:13,marginBottom:2}}>{l.nombre}</div>
                          <div style={{fontSize:11,color:B.grey4}}>{l.desarrollo} · {l.ciudad} · {precio>0?"$"+(precio/1e6).toFixed(1)+"M":"—"}</div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                          <span style={{padding:"2px 8px",borderRadius:10,fontSize:9,fontWeight:700,background:pipCol+"22",color:pipCol,border:"1px solid "+pipCol+"44",whiteSpace:"nowrap"}}>{pip}</span>
                          <span style={{fontSize:11,fontWeight:800,color:dias>90?"#7f1d1d":dias>60?"#dc2626":"#f59e0b"}}>
                            {dias!==null?dias+"d sin contacto":"Nuevo"}
                          </span>
                        </div>
                      </div>
                      {/* Prospectos del lote */}
                      {nProsp>0&&(
                        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                          {(crm.prospectos||[]).map((p,pi)=>{
                            const cli=cliSrcCRM.find(c=>c.nombre&&c.nombre.toLowerCase().trim()===p.nombre.toLowerCase().trim());
                            return <div key={pi} style={{background:B.white,borderRadius:6,padding:"3px 8px",fontSize:10,border:"1px solid #93c5fd",color:"#2563eb"}}>
                              👤 {p.nombre}{cli&&cli.asesor&&<span style={{color:B.grey3}}> · {cli.asesor}</span>}
                            </div>;
                          })}
                        </div>
                      )}
                      {/* Último seguimiento */}
                      {lastInter?(
                        <div style={{fontSize:10,color:B.grey4,borderTop:"1px solid "+B.grey1,paddingTop:6,marginBottom:8}}>
                          <span style={{fontWeight:600}}>Último: </span>{lastInter.canal} · {lastInter.reaccion} · {lastInter.fecha}
                          {lastInter.nota&&<span style={{fontStyle:"italic"}}> — {lastInter.nota.slice(0,50)}{lastInter.nota.length>50?"...":""}</span>}
                        </div>
                      ):(
                        <div style={{fontSize:10,color:"#d97706",background:"#fef9c3",borderRadius:6,padding:"3px 8px",marginBottom:8,display:"inline-block"}}>⚠ Sin interacciones registradas</div>
                      )}
                      {/* Acción directa */}
                      <button onClick={()=>{setSelectedLotCRM(l);setShowInterModal(true);setDrawerLotes(null);}} style={{padding:"5px 12px",background:B.gold,color:B.navy,border:"none",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>+ Registrar seguimiento</button>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
        {/* Drawer: Tiempo en Inventario */}
        {drawerInventario&&(
